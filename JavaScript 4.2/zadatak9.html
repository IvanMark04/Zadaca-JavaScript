<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">
<title>Savršeni brojevi</title>
</head>

<body>


<script>


function savrseni(n)
{


for(let broj = 1; broj <= n; broj++)
{

let suma = 0;


for(let i = 1; i < broj; i++)
{

if(broj % i == 0)
{
suma += i;
}

}



if(suma == broj)
{

document.write(
broj + "<br>"
);

console.log(broj);

}


}


}



savrseni(10000);



</script>


</body>

</html>
