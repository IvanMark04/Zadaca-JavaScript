<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">
<title>Objekti</title>
</head>

<body>

<script>


let osoba1 = {
    firstName:"Marko",
    lastName:"Maric",
    age:40,
    eyeColor:"black"
};


let osoba2 = {
    firstName:"Ivan",
    lastName:"Horvat",
    age:25,
    eyeColor:"blue"
};


let osoba3 = {
    firstName:"Ana",
    lastName:"Peric",
    age:30,
    eyeColor:"green"
};



let osobe = [osoba1, osoba2, osoba3];



for(let osoba of osobe)
{

    for(let podatak in osoba)
    {

        document.write(
            podatak + ": " + osoba[podatak] + "<br>"
        );

        console.log(
            podatak + ": " + osoba[podatak]
        );

    }


    document.write("<br>");

}



</script>


</body>

</html>
