<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">
<title>Prosti brojevi</title>
</head>


<body>


<script>


function prostBroj(broj)
{

if(broj < 2)
return false;


for(let i = 2; i < broj; i++)
{

if(broj % i == 0)
return false;

}


return true;

}



for(let i = 1; i <= 1000; i++)
{

if(prostBroj(i))
{

console.log(i);

document.write(i + "<br>");

}

}



</script>


</body>

</html>
