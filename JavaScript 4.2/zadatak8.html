<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">
<title>Filter polja</title>
</head>

<body>


<script>


let arr = [
"Ovo",
"je",
"My",
"prvi",
"komad",
"OF",
"JAVASCRIPT",
"koda",
"Koji",
"je",
"proradio"
];



function filtriraj(polje)
{

let novo = [];


for(let rijec of polje)
{

if(
rijec.length >= 5 ||
rijec === rijec.toUpperCase()
)
{

novo.push(rijec);

}

}


return novo;

}



let rezultat = filtriraj(arr);



document.write(rezultat);



console.log(rezultat);



</script>


</body>

</html>
