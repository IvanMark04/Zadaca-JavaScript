<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <title>Kvadrati brojeva</title>
</head>

<body>

<script>


for(let i = 2; i <= 200; i += 2)
{

    let kvadrat = i * i;


    console.log(i + " - " + kvadrat);


    document.write(
        i + " - " + kvadrat + "<br>"
    );

}


</script>

</body>

</html>
