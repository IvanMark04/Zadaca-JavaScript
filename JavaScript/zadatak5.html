<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <title>Aritmetička sredina</title>
</head>

<body>


<script>


let n = 200;

let suma = 0;


for(let i = 1; i <= n; i++)
{
    suma += i;
}


let sredina = suma / n;


console.log(sredina);


document.write(
    "Aritmetička sredina brojeva od 1 do "
    + n + " je: " + sredina
);


</script>


</body>

</html>
