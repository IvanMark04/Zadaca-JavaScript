<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">

<title>DOM paragrafi</title>


<script>


function dodajParagraf()
{


let novi =
document.createElement("p");


let tekst =
document.createTextNode(
"Novi dodani paragraf teksta"
);



novi.appendChild(tekst);



document
.getElementById("thisLocation")
.appendChild(novi);



}



</script>


</head>



<body>


<p>

<a href="#" onclick="dodajParagraf()">
Kliknite ovdje da dodate novi paragraf tekst
</a>

</p>



<p id="thisLocation">
Novi paragrafi teksta će se pojaviti ispod
</p>


<p>
Ovo je defaultni prvi paragraf teksta
</p>



</body>

</html>
