<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">
<title>Zbrajanje</title>
</head>


<body>


<input type="text" id="broj1">

<input type="text" id="broj2">

<input type="text" id="rezultat">


<button onclick="zbroji()">
Zbroji
</button>



<script>


function zbroji()
{

let a =
Number(document.getElementById("broj1").value);


let b =
Number(document.getElementById("broj2").value);



document.getElementById("rezultat").value =
a+b;


}



</script>


</body>

</html>
