<!DOCTYPE html>
<html lang="hr">

<head>
<meta charset="UTF-8">
<title>Pozadina</title>
</head>


<body>


<button onclick="promijeniBoju()">
Promijeni pozadinu
</button>


<p id="boja"></p>



<script>


function promijeniBoju()
{

let boja = "#" + Math.floor(
Math.random()*16777215
).toString(16);


document.body.style.backgroundColor = boja;


document.getElementById("boja").innerHTML =
"Trenutna boja: " + boja;

}



</script>


</body>

</html>
